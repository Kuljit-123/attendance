<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
        }

        h2 {
            margin-top: 20px;
            color: #333;
        }

        form {
            margin: 15px;
        }

        input {
            padding: 8px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 8px 15px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 80%;
            background: white;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }

        th {
            background: #4facfe;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #f1f1f1;
        }

        select {
            padding: 5px;
            border-radius: 5px;
        }

        .submit-btn {
            margin-top: 15px;
            padding: 10px 20px;
            background: #28a745;
        }

        .submit-btn:hover {
            background: #218838;
        }
    </style>
</head>

<body>

<h2>Attendance Dashboard</h2>

<!-- Add Student -->
<form action="/add" method="post">
    <input type="number" name="roll" placeholder="Roll" required>
    <input type="text" name="name" placeholder="Name" required>
    <button type="submit">Add Student</button>
</form>

<form action="/submit_attendance" method="post">

<table>
<tr>
    <th>Roll</th>
    <th>Name</th>
    <th>Total</th>
    <th>Present</th>
    <th>%</th>
    <th>Status</th>
</tr>

{% for s in students %}
<tr>
    <td>{{s[0]}}</td>
    <td>{{s[1]}}</td>
    <td>{{s[2]}}</td>
    <td>{{s[3]}}</td>
    <td>
        {% if s[2] == 0 %}
            0%
        {% else %}
            {{ (s[3]/s[2]*100)|round(2) }}%
        {% endif %}
    </td>
    <td>
        <select name="{{s[0]}}" required>
            <option value="">Select</option>
            <option value="Present">Present</option>
            <option value="Absent">Absent</option>
        </select>
    </td>
</tr>
{% endfor %}
</table>

<br>

<button type="submit" class="submit-btn">Submit Attendance</button>

</form>

</body>
</html>
